<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — AI Tutoring Tool</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="styles.css">
  <style>
    .dashboard {
      padding: 2rem 0;
    }

    /* ── TOP BAR ──────────────────────────── */
    .dash-topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .dash-greeting {
      font-family: 'Syne', sans-serif;
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -.03em;
      color: var(--text);
      line-height: 1.1;
    }

    .dash-greeting span {
      color: var(--gold);
    }

    .dash-subtitle {
      font-size: .875rem;
      color: var(--muted);
      margin-top: .3rem;
    }

    .streak-pill {
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 100px;
      padding: .6rem 1.2rem;
      white-space: nowrap;
    }

    .streak-fire {
      font-size: 1.25rem;
      animation: streakPulse 2s ease infinite;
    }

    @keyframes streakPulse {

      0%,
      100% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.15)
      }
    }

    .streak-num {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: #f97316;
      letter-spacing: -.02em;
    }

    .streak-label {
      font-size: .8rem;
      color: var(--muted);
      font-weight: 500;
    }

    /* ── MAIN GRID ────────────────────────── */
    .dash-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    /* ── CALENDAR ─────────────────────────── */
    .calendar-month-label {
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--gold);
      margin-bottom: 1rem;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: .35rem;
      margin-bottom: .75rem;
    }

    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      background: var(--surface2);
      font-size: .78rem;
      font-weight: 500;
      color: var(--text2);
      border: 1px solid transparent;
      transition: all .2s;
      user-select: none;
    }

    .calendar-day:hover {
      background: rgba(245, 200, 66, .1);
      color: var(--gold);
      border-color: rgba(245, 200, 66, .2);
    }

    .calendar-day.today {
      border-color: rgba(245, 200, 66, .4);
      color: var(--gold);
      font-weight: 700;
    }

    .calendar-day.completed {
      background: rgba(34, 197, 94, .12);
      color: var(--green);
      border-color: rgba(34, 197, 94, .25);
    }

    .calendar-hint {
      font-size: .78rem;
      color: var(--muted);
      text-align: center;
    }

    /* ── PROGRESS ─────────────────────────── */
    .progress-ring-wrap {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
    }

    .progress-ring {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    .ring-bg {
      fill: transparent;
      stroke: var(--surface3);
      stroke-width: 10;
    }

    .ring-val {
      fill: transparent;
      stroke: var(--gold);
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset .7s cubic-bezier(.34, 1.56, .64, 1);
    }

    .ring-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .ring-pct {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: -.03em;
      line-height: 1;
    }

    .ring-sub {
      font-size: .7rem;
      color: var(--muted);
      font-weight: 500;
      margin-top: .15rem;
    }

    .subject-row {
      margin-bottom: .85rem;
    }

    .subject-row-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: .35rem;
      font-size: .8rem;
    }

    .subject-row-header span:first-child {
      color: var(--text2);
      font-weight: 500;
    }

    .subject-row-header span:last-child {
      color: var(--gold);
      font-weight: 600;
      font-size: .75rem;
    }

    /* ── TASKS ────────────────────────────── */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .85rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      transition: all .2s;
    }

    .task-item:hover {
      border-color: var(--border2);
    }

    .task-item.completed {
      border-left: 3px solid var(--green);
      opacity: .7;
    }

    .task-item.ai-generated {
      border-left: 3px solid var(--gold);
    }

    .task-checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 17px;
      height: 17px;
      border: 2px solid var(--border2);
      border-radius: 5px;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: all .2s;
      background: transparent;
    }

    .task-checkbox:hover {
      border-color: var(--gold);
    }

    .task-checkbox:checked {
      background: var(--gold);
      border-color: var(--gold);
    }

    .task-checkbox:checked::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #0a0c10;
      font-size: .65rem;
      font-weight: 900;
    }

    .task-content {
      flex: 1;
      font-size: .875rem;
      color: var(--text);
    }

    .task-item.completed .task-content {
      text-decoration: line-through;
      color: var(--muted);
    }

    .task-ai-badge {
      font-size: .7rem;
      color: var(--gold);
      font-weight: 600;
      background: rgba(245, 200, 66, .08);
      padding: .1rem .4rem;
      border-radius: 4px;
      margin-left: .3rem;
    }

    .task-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: .25rem;
      border-radius: 5px;
      transition: all .2s;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .task-delete:hover {
      color: var(--red);
      background: rgba(244, 63, 94, .1);
    }

    .empty-tasks {
      text-align: center;
      padding: 2.5rem;
      color: var(--muted);
      font-size: .875rem;
    }

    .empty-tasks-icon {
      font-size: 2.5rem;
      margin-bottom: .75rem;
      opacity: .5;
    }

    /* ── FLOATING ACTIONS ─────────────────── */
    .floating-actions {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      display: flex;
      flex-direction: column;
      gap: .65rem;
      z-index: 100;
    }

    .floating-btn {
      display: flex;
      align-items: center;
      gap: .55rem;
      padding: .65rem 1.1rem;
      border-radius: 100px;
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      color: white;
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: all .2s;
    }

    .floating-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .floating-btn.video {
      background: var(--red);
    }

    .floating-btn.chat {
      background: var(--gold);
      color: #0a0c10;
    }

    @media(max-width:700px) {
      .dash-grid {
        grid-template-columns: 1fr;
      }

      .dash-topbar {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <header class="header">
    <div class="logo"><span class="logo-dot"></span>AI Tutoring</div>
    <nav class="nav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="login.html" class="nav-link">Login</a>
      <a href="dashboard.html" class="nav-link active">Dashboard</a>
      <a href="chat.html" class="nav-link">Chat</a>
      <a href="video.html" class="nav-link">Video</a>
      <span id="nav-user-name" style="color:var(--gold);font-weight:600;padding:.4rem .6rem;font-size:.875rem"></span>
      <button onclick="Auth.logout()" class="nav-link danger">Logout</button>
    </nav>
  </header>

  <div class="container dashboard">
    <!-- Top bar -->
    <div class="dash-topbar">
      <div>
        <div class="dash-greeting">Super Kid <span>Dashboard</span></div>
        <div class="dash-subtitle">Keep going — you're doing great! 🎯</div>
      </div>
      <div class="streak-pill">
        <span class="streak-fire">🔥</span>
        <span class="streak-num" id="streak-count">0</span>
        <span class="streak-label">Day Streak</span>
      </div>
    </div>

    <!-- 2-col grid -->
    <div class="dash-grid">
      <!-- Calendar -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="18" height="18" x="3" y="4" rx="2" />
              <line x1="16" x2="16" y1="2" y2="6" />
              <line x1="8" x2="8" y1="2" y2="6" />
              <line x1="3" x2="21" y1="10" y2="10" />
            </svg>
            Daily Challenges
          </div>
        </div>
        <div class="card-content">
          <div class="calendar-month-label" id="calendar-month"></div>
          <div class="calendar-grid" id="calendar-grid"></div>
          <p class="calendar-hint">Tap days to mark completed challenges ⭐</p>
        </div>
      </div>

      <!-- Progress -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20V10" />
              <path d="M18 20V4" />
              <path d="M6 20v-4" />
            </svg>
            Task Progress
          </div>
        </div>
        <div class="card-content">
          <div class="progress-ring-wrap">
            <svg class="progress-ring" viewBox="0 0 100 100">
              <circle class="ring-bg" cx="50" cy="50" r="40" />
              <circle class="ring-val" cx="50" cy="50" r="40" id="progress-circle-value" />
            </svg>
            <div class="ring-text">
              <div class="ring-pct" id="progress-percentage">0%</div>
              <div class="ring-sub">Done</div>
            </div>
          </div>
          <div class="subject-row">
            <div class="subject-row-header"><span>📖 Reading</span><span id="reading-percentage">0%</span></div>
            <div class="progress-bar">
              <div class="progress-bar-fill" id="reading-progress" style="width:0%"></div>
            </div>
          </div>
          <div class="subject-row">
            <div class="subject-row-header"><span>➕ Math</span><span id="math-percentage">0%</span></div>
            <div class="progress-bar">
              <div class="progress-bar-fill" id="math-progress" style="width:0%"></div>
            </div>
          </div>
          <div class="subject-row">
            <div class="subject-row-header"><span>🔬 Science</span><span id="science-percentage">0%</span></div>
            <div class="progress-bar">
              <div class="progress-bar-fill" id="science-progress" style="width:0%"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tasks -->
    <div class="card" style="margin-bottom:1rem">
      <div class="card-header">
        <div class="card-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
          </svg>
          Today's Tasks
        </div>
        <div style="display:flex;gap:.5rem">
          <button id="ai-tasks-btn" class="btn btn-secondary btn-sm">✨ AI Tasks</button>
          <button id="add-task-btn" class="btn btn-primary btn-sm">+ Add Task</button>
        </div>
      </div>
      <div class="card-content">
        <div id="task-list" class="task-list"></div>
      </div>

  <!-- Floating actions -->
  <div class="floating-actions">
    <a href="video.html" class="floating-btn video">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2">

        <rect width="14" height="12" x="2" y="6" rx="2" />
      </svg>
      Video
    </a>
    <a href="chat.html" class="floating-btn chat">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
      </svg>
      Chat
    </a>
  </div>

  <!-- AI Tasks Modal -->
  <div id="ai-tasks-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">✨ Generate AI Tasks</h3>
        <button class="modal-close" id="ai-tasks-close"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
          </svg></button>
      </div>
      <div class="modal-body">
        <div id="ai-tasks-alert" class="alert alert-danger hidden"></div>
        <div class="form-group">
          <label class="form-label">Subject Type</label>
          <div class="form-radio-group">
            <div class="form-radio-item"><input type="radio" id="predefined" name="subject-type" value="predefined"
                class="form-radio" checked><label for="predefined">From list</label></div>
            <div class="form-radio-item"><input type="radio" id="custom" name="subject-type" value="custom"
                class="form-radio"><label for="custom">Custom</label></div>
          </div>
        </div>
        <div id="predefined-subject" class="form-group">
          <label class="form-label">Subject</label>
          <select id="subject" class="form-select">
            <option value="math">Mathematics</option>
            <option value="science">Science</option>
            <option value="english">English</option>
            <option value="history">History</option>
            <option value="art">Art</option>
            <option value="music">Music</option>
            <option value="programming">Programming</option>
          </select>
        </div>
        <div id="custom-subject" class="form-group hidden">
          <label class="form-label">Custom Subject</label>
          <input type="text" id="custom-subject-input" class="form-input" placeholder="e.g. Quantum Physics, Spanish…">
        </div>
        <div class="form-group">
          <label class="form-label">Difficulty</label>
          <select id="difficulty" class="form-select">
            <option value="beginner">Beginner</option>
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="challenging">Challenging</option>
            <option value="advanced">Advanced</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Number of Tasks</label>
          <select id="count" class="form-select">
            <option value="1">1 Task</option>
            <option value="2">2 Tasks</option>
            <option value="3" selected>3 Tasks</option>
            <option value="5">5 Tasks</option>
            <option value="10">10 Tasks</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button id="generate-tasks-btn" class="btn btn-primary">✨ Generate Tasks</button>
      </div>
    </div>
  </div>

  <!-- Add Task Modal -->
  <div id="add-task-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Add New Task</h3>
        <button class="modal-close" id="add-task-close"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
          </svg></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Task Description</label>
          <input type="text" id="task-text" class="form-input" placeholder="What do you need to do?">
        </div>
        <div class="form-group">
          <label class="form-label">Subject</label>
          <select id="task-subject" class="form-select">
            <option value="general">General</option>
            <option value="math">Mathematics</option>
            <option value="science">Science</option>
            <option value="reading">Reading</option>
            <option value="writing">Writing</option>
            <option value="history">History</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button id="add-task-submit" class="btn btn-primary">Add Task</button>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      if (!requireAuth()) return;

      const taskListEl = document.getElementById('task-list');
      const addTaskBtn = document.getElementById('add-task-btn');
      const aiTasksBtn = document.getElementById('ai-tasks-btn');
      const addTaskModal = document.getElementById('add-task-modal');
      const aiTasksModal = document.getElementById('ai-tasks-modal');
      const addTaskClose = document.getElementById('add-task-close');
      const aiTasksClose = document.getElementById('ai-tasks-close');
      const addTaskSubmit = document.getElementById('add-task-submit');
      const generateTasksBtn = document.getElementById('generate-tasks-btn');
      const taskText = document.getElementById('task-text');
      const taskSubject = document.getElementById('task-subject');
      const subjectType = document.getElementsByName('subject-type');
      const predefinedDiv = document.getElementById('predefined-subject');
      const customDiv = document.getElementById('custom-subject');
      const subjectEl = document.getElementById('subject');
      const customInput = document.getElementById('custom-subject-input');
      const difficultyEl = document.getElementById('difficulty');
      const countEl = document.getElementById('count');
      const aiAlert = document.getElementById('ai-tasks-alert');
      const progressCircle = document.getElementById('progress-circle-value');
      const progressPct = document.getElementById('progress-percentage');
      const calendarGrid = document.getElementById('calendar-grid');
      const calendarMonth = document.getElementById('calendar-month');
      const streakCountEl = document.getElementById('streak-count');

      let tasks = [];
      let completedDates = [];

      async function loadAll() {
        try {
          const [taskRes, dateRes] = await Promise.all([Tasks.getAll(), Tasks.getDates()]);
          tasks = taskRes.tasks;
          completedDates = dateRes.dates;
          renderTasks(); renderCalendar(); updateProgress(); updateStreak();
        } catch (err) { console.error('Load error:', err); }
      }

      await loadAll();

      addTaskBtn.addEventListener('click', () => addTaskModal.classList.add('active'));
      aiTasksBtn.addEventListener('click', () => aiTasksModal.classList.add('active'));
      addTaskClose.addEventListener('click', () => addTaskModal.classList.remove('active'));
      aiTasksClose.addEventListener('click', () => aiTasksModal.classList.remove('active'));
      window.addEventListener('click', e => {
        if (e.target === addTaskModal) addTaskModal.classList.remove('active');
        if (e.target === aiTasksModal) aiTasksModal.classList.remove('active');
      });

      subjectType.forEach(r => r.addEventListener('change', () => {
        if (r.value === 'custom' && r.checked) { predefinedDiv.classList.add('hidden'); customDiv.classList.remove('hidden'); }
        if (r.value === 'predefined' && r.checked) { customDiv.classList.add('hidden'); predefinedDiv.classList.remove('hidden'); }
      }));

      addTaskSubmit.addEventListener('click', async () => {
        if (!taskText.value.trim()) return;
        try {
          const res = await Tasks.create(taskText.value.trim(), taskSubject.value);
          tasks.push(res.task); taskText.value = '';
          addTaskModal.classList.remove('active'); renderTasks(); updateProgress();
        } catch (err) { alert(err.message); }
      });

      generateTasksBtn.addEventListener('click', async () => {
        const useCustom = document.getElementById('custom').checked;
        const subjectVal = useCustom ? customInput.value.trim() : subjectEl.value;
        if (useCustom && !subjectVal) {
          aiAlert.textContent = 'Please enter a custom subject'; aiAlert.classList.remove('hidden'); return;
        }
        aiAlert.classList.add('hidden');
        generateTasksBtn.disabled = true;
        generateTasksBtn.innerHTML = '<div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
        await new Promise(r => setTimeout(r, 1200));
        const generated = generateSimulatedAITasks(subjectVal, difficultyEl.value, parseInt(countEl.value));
        for (const text of generated) {
          try { const res = await Tasks.create(text, mapSubjectToCategory(subjectVal), true); tasks.push(res.task); } catch { }
        }
        renderTasks(); updateProgress();
        aiTasksModal.classList.remove('active');
        generateTasksBtn.disabled = false;
        generateTasksBtn.innerHTML = '✨ Generate Tasks';
      });

      function renderTasks() {
        taskListEl.innerHTML = '';
        if (!tasks.length) {
          taskListEl.innerHTML = '<div class="empty-tasks"><div class="empty-tasks-icon">📋</div>No tasks yet — click <strong>AI Tasks</strong> or <strong>Add Task</strong> to begin!</div>';
          return;
        }
        tasks.forEach(task => {
          const item = document.createElement('div');
          item.className = `task-item ${task.completed ? 'completed' : ''} ${task.is_ai_generated ? 'ai-generated' : ''}`;

          const cb = document.createElement('input');
          cb.type = 'checkbox'; cb.className = 'task-checkbox'; cb.checked = !!task.completed;
          cb.addEventListener('change', async () => {
            try {
              await Tasks.toggle(task.id, cb.checked);
              task.completed = cb.checked ? 1 : 0;
              item.classList.toggle('completed', !!task.completed); updateProgress();
            } catch { cb.checked = !cb.checked; }
          });

          const content = document.createElement('div');
          content.className = 'task-content'; content.textContent = task.text;
          if (task.is_ai_generated) {
            const badge = document.createElement('span');
            badge.className = 'task-ai-badge'; badge.textContent = '✨ AI';
            content.appendChild(badge);
          }

          const del = document.createElement('button');
          del.className = 'task-delete';
          del.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>';
          del.addEventListener('click', async () => {
            try { await Tasks.remove(task.id); tasks = tasks.filter(t => t.id !== task.id); renderTasks(); updateProgress(); }
            catch (err) { alert(err.message); }
          });

          item.appendChild(cb); item.appendChild(content); item.appendChild(del);
          taskListEl.appendChild(item);
        });
      }

      function updateProgress() {
        const total = tasks.length, done = tasks.filter(t => t.completed).length;
        const pct = total > 0 ? Math.round((done / total) * 100) : 0;
        const circ = 2 * Math.PI * 40;
        progressCircle.style.strokeDasharray = circ;
        progressCircle.style.strokeDashoffset = circ * (1 - pct / 100);
        progressPct.textContent = `${pct}%`;
        ['reading', 'math', 'science'].forEach(subj => {
          const sub = tasks.filter(t => t.subject === subj);
          const sp = sub.length ? Math.round(sub.filter(t => t.completed).length / sub.length * 100) : 0;
          document.getElementById(`${subj}-progress`).style.width = `${sp}%`;
          document.getElementById(`${subj}-percentage`).textContent = `${sp}%`;
        });
      }

      function renderCalendar() {
        const today = new Date();
        calendarMonth.textContent = today.toLocaleString('default', { month: 'long', year: 'numeric' });
        calendarGrid.innerHTML = '';
        const days = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
        for (let i = 1; i <= days; i++) {
          const date = new Date(today.getFullYear(), today.getMonth(), i).toISOString().split('T')[0];
          const isToday = i === today.getDate(), isDone = completedDates.includes(date);
          const el = document.createElement('div');
          el.className = `calendar-day${isToday ? ' today' : ''}${isDone ? ' completed' : ''}`;
          el.textContent = i;
          el.addEventListener('click', async () => {
            try {
              const res = await Tasks.toggleDate(date);
              if (res.completed) completedDates.push(date);
              else completedDates = completedDates.filter(d => d !== date);
              renderCalendar(); updateStreak();
            } catch { }
          });
          calendarGrid.appendChild(el);
        }
      }

      function updateStreak() {
        const today = new Date().toISOString().split('T')[0];
        const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
        if (!completedDates.includes(today) && !completedDates.includes(yesterday)) { streakCountEl.textContent = '0'; return; }
        let streak = 0, check = new Date();
        while (completedDates.includes(check.toISOString().split('T')[0])) { streak++; check.setDate(check.getDate() - 1); }
        streakCountEl.textContent = streak;
      }

      function generateSimulatedAITasks(subject, difficulty, count) {
        const templates = {
          math: { medium: ['Practice multiplication tables 1-5', 'Solve 10 division problems', 'Calculate perimeter of rectangles', 'Convert fractions to decimals', 'Solve word problems involving money'] },
          science: { medium: ['Build a simple electric circuit', 'Research the solar system', 'Conduct a forces experiment', 'Learn about the digestive system', 'Investigate material properties'] },
          english: { medium: ['Read a chapter and summarize it', 'Write a descriptive paragraph', 'Identify adjectives and adverbs', 'Practice punctuation in writing', 'Write a simple poem'] },
          history: { medium: ['Create a country history timeline', 'Write a report on an ancient civilization', 'Compare life today vs 100 years ago', 'Research a significant historical event', 'Research an invention history'] },
          programming: { medium: ['Create a program using loops', 'Build a simple calculator', 'Learn about arrays', 'Create a file read/write program', 'Build rock-paper-scissors game'] }
        };
        const pool = templates[subject]?.[difficulty] || templates[subject]?.medium || [`Research a key concept in ${subject}`, `Practice ${subject} for 30 minutes`, `Create a mind map for ${subject}`, `Solve 5 ${subject} problems`, `Teach someone a ${subject} concept`];
        return pool.sort(() => Math.random() - .5).slice(0, count);
      }

      function mapSubjectToCategory(s) {
        s = s.toLowerCase();
        if (['math', 'algebra', 'calculus', 'geometry', 'programming', 'coding'].some(k => s.includes(k))) return 'math';
        if (['science', 'physics', 'chemistry', 'biology'].some(k => s.includes(k))) return 'science';
        return 'reading';
      }
    });
  </script>
