<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — AI Tutoring Tool</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .login-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
      animation: fadeUp .45s ease both;
      position: relative;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .login-top {
      padding: 2rem 2rem 1.5rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .login-logo {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 1.25rem;
    }

    .login-logo-dot {
      width: 7px;
      height: 7px;
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--gold);
    }

    .login-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.03em;
      margin-bottom: .3rem;
    }

    .login-subtitle {
      font-size: .875rem;
      color: var(--muted);
    }

    /* Role selector */
    .role-row {
      display: flex;
      gap: .5rem;
      margin-top: 1.25rem;
    }

    .role-option {
      flex: 1;
      padding: .6rem .75rem;
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      text-align: center;
      cursor: pointer;
      font-size: .85rem;
      font-weight: 500;
      color: var(--text2);
      background: var(--surface2);
      transition: all .2s;
      user-select: none;
    }

    .role-option:hover {
      border-color: rgba(245, 200, 66, .3);
      color: var(--gold);
    }

    .role-option.active {
      background: rgba(245, 200, 66, .1);
      border-color: rgba(245, 200, 66, .35);
      color: var(--gold);
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 3px;
      margin-bottom: 1.5rem;
    }

    .tab {
      flex: 1;
      padding: .55rem 1rem;
      border-radius: 7px;
      text-align: center;
      cursor: pointer;
      font-size: .875rem;
      font-weight: 600;
      color: var(--muted);
      transition: all .2s;
    }

    .tab:hover {
      color: var(--text);
    }

    .tab.active {
      background: var(--gold);
      color: #0a0c10;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn .25s ease;
    }

    .login-body {
      padding: 1.75rem 2rem;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-top: 1px solid var(--border2);
    }

    .divider-text {
      font-size: .75rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      white-space: nowrap;
    }

    /* Social */
    .social-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .65rem;
      padding: .8rem;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      font-family: inherit;
    }

    .social-btn:hover {
      border-color: rgba(255, 255, 255, .2);
      background: var(--surface3);
    }

    .forgot-link {
      font-size: .8rem;
      color: var(--gold);
      transition: opacity .2s;
    }

    .forgot-link:hover {
      opacity: .8;
      text-decoration: underline;
    }

    .terms-link {
      color: var(--gold);
    }

    .terms-link:hover {
      text-decoration: underline;
    }

    .w-full {
      width: 100%;
    }
  </style>
</head>

<body>
  <header class="header">
    <div class="logo"><span class="logo-dot"></span>AI Tutoring</div>
    <nav class="nav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="login.html" class="nav-link active">Login</a>
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="chat.html" class="nav-link">Chat</a>
      <a href="video.html" class="nav-link">Video</a>
    </nav>
  </header>

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-top">
        <div class="login-logo"><span class="login-logo-dot"></span>AI Tutoring</div>
        <h1 class="login-title">Welcome Back</h1>
        <p class="login-subtitle">Sign in to continue your learning journey</p>
        <div class="role-row">
          <div class="role-option active" data-type="student">👨‍🎓 Student</div>
          <div class="role-option" data-type="parent">👨‍👩‍👧 Parent</div>
        </div>
      </div>

      <div class="login-body">
        <!-- Tabs -->
        <div class="tabs">
          <div class="tab active" data-tab="login">Sign In</div>
          <div class="tab" data-tab="register">Register</div>
        </div>

        <!-- Login -->
        <div class="tab-content active" id="login-tab">
          <div id="login-error" class="alert alert-danger hidden"></div>
          <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label class="form-label">Email or Username</label>
              <input type="text" id="email" class="form-input" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.45rem">
                <label class="form-label" style="margin:0">Password</label>
                <a href="#" class="forgot-link" onclick="alert('Coming soon!');return false">Forgot?</a>
              </div>
              <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
            </div>
            <div class="checkbox-container">
              <input type="checkbox" id="remember">
              <label for="remember">Remember me</label>
            </div>
            <button type="submit" class="btn btn-primary w-full">
              <span>Sign In</span>
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5">
                <path d="M5 12h14" />
                <path d="m12 5 7 7-7 7" />
              </svg>
            </button>
          </form>
        </div>

        <!-- Register -->
        <div class="tab-content" id="register-tab">
          <div id="register-error" class="alert alert-danger hidden"></div>
          <form id="register-form" onsubmit="handleRegister(event)">
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input type="text" id="name" class="form-input" placeholder="Your full name" required>
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" id="reg-email" class="form-input" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
              <label class="form-label">Password</label>
              <input type="password" id="reg-password" class="form-input" placeholder="Create a strong password"
                required>
            </div>
            <div class="form-group">
              <label class="form-label">Confirm Password</label>
              <input type="password" id="confirm-password" class="form-input" placeholder="Repeat your password"
                required>
            </div>
            <div class="checkbox-container">
              <input type="checkbox" id="terms" required>
              <label for="terms">I agree to the <a href="#" class="terms-link">Terms & Conditions</a></label>
            </div>
            <button type="submit" class="btn btn-primary w-full">
              <span>Create Account</span>
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                <circle cx="9" cy="7" r="4" />
                <line x1="19" y1="8" x2="19" y2="14" />
                <line x1="22" y1="11" x2="16" y2="11" />
              </svg>
            </button>
          </form>
        </div>

        <div class="divider"><span class="divider-text">or continue with</span></div>
        <button class="social-btn" onclick="alert('Google Sign-In coming soon!')">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#EA4335"
              d="M5.266 9.765A7.077 7.077 0 0 1 12 4.909c1.69 0 3.218.6 4.418 1.582L19.91 3C17.782 1.145 15.055 0 12 0 7.27 0 3.198 2.698 1.24 6.65l4.026 3.115Z" />
            <path fill="#34A853"
              d="M16.04 18.013c-1.09.703-2.474 1.078-4.04 1.078a7.077 7.077 0 0 1-6.723-4.823l-4.04 3.067A11.965 11.965 0 0 0 12 24c2.933 0 5.735-1.043 7.834-3l-3.793-2.987Z" />
            <path fill="#4A90E2"
              d="M19.834 21c2.195-2.048 3.62-5.096 3.62-9 0-.71-.109-1.473-.272-2.182H12v4.637h6.436c-.317 1.559-1.17 2.766-2.395 3.558L19.834 21Z" />
            <path fill="#FBBC05"
              d="M5.277 14.268A7.12 7.12 0 0 1 4.909 12c0-.782.125-1.533.357-2.235L1.24 6.65A11.934 11.934 0 0 0 0 12c0 1.92.445 3.73 1.237 5.335l4.04-3.067Z" />
          </svg>
          Continue with Google
        </button>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (isLoggedIn()) window.location.href = 'dashboard.html';
    });

    let selectedRole = 'student';

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const id = tab.dataset.tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => {
          c.classList.toggle('active', c.id === id + '-tab');
        });
      });
    });

    document.querySelectorAll('.role-option').forEach(opt => {
      opt.addEventListener('click', () => {
        document.querySelectorAll('.role-option').forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
        selectedRole = opt.dataset.type;
      });
    });

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.remove('hidden');
    }
    function setLoading(btn, loading) {
      btn.disabled = loading;
      btn.querySelector('span').textContent = loading ? 'Please wait…' : btn.dataset.label;
    }

    async function handleLogin(e) {
      e.preventDefault();
      document.getElementById('login-error').classList.add('hidden');
      const btn = e.target.querySelector('button[type="submit"]');
      if (!btn.dataset.label) btn.dataset.label = btn.querySelector('span').textContent;
      setLoading(btn, true);
      try {
        await Auth.login(document.getElementById('email').value.trim(), document.getElementById('password').value);
        window.location.href = 'dashboard.html';
      } catch (err) { showError('login-error', err.message); setLoading(btn, false); }
    }

    async function handleRegister(e) {
      e.preventDefault();
      document.getElementById('register-error').classList.add('hidden');
      const pw = document.getElementById('reg-password').value;
      const cp = document.getElementById('confirm-password').value;
      if (pw !== cp) { showError('register-error', 'Passwords do not match'); return; }
      const btn = e.target.querySelector('button[type="submit"]');
      if (!btn.dataset.label) btn.dataset.label = btn.querySelector('span').textContent;
      setLoading(btn, true);
      try {
        await Auth.register(document.getElementById('name').value.trim(), document.getElementById('reg-email').value.trim(), pw, selectedRole);
        window.location.href = 'dashboard.html';
      } catch (err) { showError('register-error', err.message); setLoading(btn, false); }
    }
  </script>
</body>

</html>
